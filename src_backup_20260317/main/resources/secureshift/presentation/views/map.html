<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#111827; overflow:hidden; }
  canvas { display:block; }
  #ui { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
  .legend { position:absolute; bottom:18px; left:14px; background:rgba(10,15,30,0.88); border:1px solid #1e3a5f; border-radius:8px; padding:10px 16px; font:12px/2 'Courier New',monospace; color:#a8b8d8; pointer-events:all; }
  .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:8px; vertical-align:middle; }
  .sq  { display:inline-block; width:9px; height:9px; border-radius:1px; margin-right:8px; vertical-align:middle; transform:rotate(45deg); }
  #tooltip { position:absolute; display:none; background:rgba(10,15,30,0.95); border:1px solid #2d4a7a; border-radius:6px; padding:7px 12px; font:12px 'Courier New',monospace; color:#ccd6f6; pointer-events:none; z-index:100; }
  #zoombtns { position:absolute; top:14px; left:14px; display:flex; flex-direction:column; gap:4px; pointer-events:all; }
  .zbtn { width:30px; height:30px; background:rgba(10,15,30,0.9); border:1px solid #2d4a7a; border-radius:5px; color:#8ab4d8; font-size:18px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center; user-select:none; }
  .zbtn:hover { background:#1e3a5f; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="zoombtns">
    <div class="zbtn" onclick="zoom(1.25)">+</div>
    <div class="zbtn" onclick="zoom(0.8)">−</div>
  </div>
  <div class="legend">
    <div><span class="dot" style="background:#3b9eff"></span>Available Guard</div>
    <div><span class="dot" style="background:#00e676"></span>On Duty Guard</div>
    <div><span class="sq"  style="background:#ff4444"></span>Security Site</div>
  </div>
  <div id="tooltip"></div>
</div>
<script>
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;mapCache=null;}
window.addEventListener('resize',resize);
var MAP={minLat:51.28,maxLat:51.72,minLon:-0.55,maxLon:0.35};
var scale=1,offsetX=0,offsetY=0,mapCache=null;
function project(lat,lon){
  var x=(lon-MAP.minLon)/(MAP.maxLon-MAP.minLon);
  var lr=lat*Math.PI/180,nr=MAP.minLat*Math.PI/180,xr=MAP.maxLat*Math.PI/180;
  var ym=Math.log(Math.tan(Math.PI/4+lr/2)),yn=Math.log(Math.tan(Math.PI/4+nr/2)),yx=Math.log(Math.tan(Math.PI/4+xr/2));
  var y=1-(ym-yn)/(yx-yn);
  return{x:offsetX+x*canvas.width*scale,y:offsetY+y*canvas.height*scale};
}
var ROADS=[
  [[51.508,-0.055],[51.506,-0.030],[51.503,-0.010],[51.501,0.000],[51.498,0.010],[51.495,0.020]],
  [[51.510,-0.100],[51.509,-0.080],[51.508,-0.055]],
  [[51.511,-0.170],[51.510,-0.150],[51.510,-0.130],[51.510,-0.110],[51.510,-0.100]],
  [[51.483,-0.200],[51.486,-0.180],[51.488,-0.160],[51.490,-0.140],[51.492,-0.120],[51.494,-0.100],[51.496,-0.080],[51.498,-0.060],[51.500,-0.040],[51.501,0.000]],
  [[51.64,-0.12],[51.61,-0.12],[51.58,-0.12],[51.55,-0.12],[51.52,-0.12],[51.50,-0.12],[51.48,-0.12],[51.45,-0.12]],
  [[51.64,-0.07],[51.60,-0.07],[51.56,-0.07],[51.53,-0.07],[51.50,-0.07]],
  [[51.52,0.10],[51.51,0.05],[51.51,0.00],[51.51,-0.02],[51.50,-0.05],[51.50,-0.08]],
  [[51.48,0.12],[51.49,0.08],[51.49,0.04],[51.49,0.00],[51.49,-0.04],[51.49,-0.08]],
  [[51.38,-0.20],[51.42,-0.19],[51.46,-0.18],[51.48,-0.16],[51.49,-0.14],[51.49,-0.12]],
  [[51.47,-0.48],[51.48,-0.40],[51.49,-0.32],[51.49,-0.24],[51.50,-0.17],[51.50,-0.12]],
  [[51.64,-0.30],[51.62,-0.20],[51.60,-0.10],[51.59,0.00],[51.58,0.05],[51.57,0.10]],
  [[51.43,-0.28],[51.44,-0.20],[51.45,-0.12],[51.46,-0.04],[51.46,0.04],[51.46,0.10]],
  [[51.51,-0.30],[51.51,-0.22],[51.51,-0.14],[51.51,-0.10]],
  [[51.53,-0.22],[51.53,-0.16],[51.53,-0.12],[51.53,-0.08]],
  [[51.49,-0.07],[51.49,-0.04],[51.48,-0.01],[51.48,0.02]],
  [[51.55,-0.17],[51.53,-0.17],[51.52,-0.17],[51.51,-0.16]],
  [[51.52,-0.07],[51.52,-0.03],[51.52,0.01],[51.52,0.04]],
  [[51.44,-0.11],[51.46,-0.11],[51.48,-0.11],[51.49,-0.12]],
  [[51.50,-0.02],[51.50,0.00],[51.50,0.02],[51.51,0.02]],
  [[51.51,0.02],[51.51,0.00],[51.51,-0.02]],
  [[51.55,-0.30],[51.55,-0.28],[51.56,-0.27],[51.56,-0.25]],
  [[51.47,-0.48],[51.47,-0.46],[51.47,-0.45],[51.47,-0.43]],
];
var MOTORWAYS=[
  [[51.49,-0.55],[51.48,-0.48],[51.48,-0.40],[51.48,-0.35]],
  [[51.64,0.05],[51.60,0.02],[51.57,0.01],[51.55,0.00]],
  [[51.66,-0.19],[51.63,-0.18],[51.60,-0.17],[51.57,-0.16]],
];
var PARKS=[
  [[51.514,-0.175],[51.514,-0.152],[51.504,-0.152],[51.504,-0.175]],
  [[51.535,-0.172],[51.535,-0.150],[51.523,-0.150],[51.523,-0.172]],
  [[51.478,0.000],[51.478,0.012],[51.470,0.012],[51.470,0.000]],
  [[51.538,-0.040],[51.538,-0.025],[51.530,-0.025],[51.530,-0.040]],
  [[51.570,-0.178],[51.570,-0.155],[51.558,-0.155],[51.558,-0.178]],
  [[51.445,-0.295],[51.445,-0.260],[51.425,-0.260],[51.425,-0.295]],
];
var WATER=[
  [[51.512,-0.170],[51.510,-0.150],[51.510,-0.130],[51.510,-0.110],[51.508,-0.055],[51.506,-0.030],[51.503,-0.010],[51.501,0.000],[51.498,0.010],[51.495,0.020],[51.490,0.020],[51.492,0.010],[51.496,0.000],[51.499,-0.010],[51.501,-0.030],[51.503,-0.055],[51.505,-0.080],[51.507,-0.110],[51.507,-0.130],[51.507,-0.150],[51.507,-0.170]],
];
var LABELS=[[51.5074,-0.1278,'LONDON',true],[51.5308,-0.1238,'Kings Cross',false],[51.5054,-0.0235,'Canary Wharf',false],[51.4700,-0.4543,'Heathrow',false],[51.5560,-0.2796,'Wembley',false],[51.5427,0.0042,'Stratford',false],[51.5052,-0.0864,'London Bridge',false],[51.4931,-0.1448,'Victoria',false],[51.5136,-0.1381,'Oxford St',false],[51.4816,-0.0074,'Greenwich',false]];
function drawMap(){
  var c=ctx;
  c.fillStyle='#1a2035'; c.fillRect(0,0,canvas.width,canvas.height);
  c.strokeStyle='rgba(255,255,255,0.05)'; c.lineWidth=1;
  for(var lo=-0.5;lo<=0.4;lo+=0.1){var p1=project(51.28,lo),p2=project(51.72,lo);c.beginPath();c.moveTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);c.stroke();}
  for(var la=51.3;la<=51.7;la+=0.05){var p1=project(la,-0.55),p2=project(la,0.35);c.beginPath();c.moveTo(p1.x,p1.y);c.lineTo(p2.x,p2.y);c.stroke();}
  c.fillStyle='rgba(40,120,60,0.4)';
  PARKS.forEach(function(poly){c.beginPath();poly.forEach(function(pt,i){var p=project(pt[0],pt[1]);i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y);});c.closePath();c.fill();});
  c.fillStyle='rgba(30,90,180,0.6)';c.strokeStyle='rgba(50,120,220,0.7)';c.lineWidth=1;
  WATER.forEach(function(poly){c.beginPath();poly.forEach(function(pt,i){var p=project(pt[0],pt[1]);i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y);});c.closePath();c.fill();c.stroke();});
  c.strokeStyle='#c47d00';c.lineWidth=2.5;
  MOTORWAYS.forEach(function(r){c.beginPath();r.forEach(function(pt,i){var p=project(pt[0],pt[1]);i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y);});c.stroke();});
  c.strokeStyle='#3d5278';c.lineWidth=1.2;
  ROADS.forEach(function(r){c.beginPath();r.forEach(function(pt,i){var p=project(pt[0],pt[1]);i===0?c.moveTo(p.x,p.y):c.lineTo(p.x,p.y);});c.stroke();});
  LABELS.forEach(function(l){var p=project(l[0],l[1]);ctx.fillStyle=l[3]?'rgba(200,220,255,0.8)':'rgba(150,170,210,0.6)';ctx.font=l[3]?'bold 11px Courier New':'9px Courier New';ctx.textAlign='center';ctx.fillText(l[2],p.x,p.y);});
}
var guards=[],sites=[],routes=[],pulse=0;
function drawMarkers(){
  pulse+=0.05;
  routes.forEach(function(r){
    var gp=project(r.glat,r.glon),sp=project(r.slat,r.slon);
    var cx=(gp.x+sp.x)/2-(sp.y-gp.y)*0.1,cy=(gp.y+sp.y)/2+(sp.x-gp.x)*0.1;
    ctx.beginPath();ctx.setLineDash([4,6]);ctx.strokeStyle='rgba(0,230,118,0.3)';ctx.lineWidth=1.2;
    ctx.moveTo(gp.x,gp.y);ctx.quadraticCurveTo(cx,cy,sp.x,sp.y);ctx.stroke();ctx.setLineDash([]);
  });
  sites.forEach(function(s){
    var p=project(s.lat,s.lon),sz=7;
    ctx.save();ctx.translate(p.x,p.y);ctx.rotate(Math.PI/4);
    ctx.shadowColor='#ff4444';ctx.shadowBlur=8;ctx.fillStyle='#ff4444';ctx.strokeStyle='#fff';ctx.lineWidth=1.5;
    ctx.fillRect(-sz/2,-sz/2,sz,sz);ctx.strokeRect(-sz/2,-sz/2,sz,sz);ctx.restore();ctx.shadowBlur=0;
  });
  guards.forEach(function(g){
    var p=project(g.lat,g.lon),r=5;
    if(g.assigned){
      var pr=r+4+Math.sin(pulse)*3;
      ctx.beginPath();ctx.arc(p.x,p.y,pr,0,Math.PI*2);ctx.strokeStyle='rgba(0,230,118,'+(0.3+Math.sin(pulse)*0.2)+')';ctx.lineWidth=1;ctx.stroke();
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.shadowColor='#00e676';ctx.shadowBlur=10;ctx.fillStyle='#00e676';ctx.fill();
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.shadowColor='#3b9eff';ctx.shadowBlur=8;ctx.fillStyle='#3b9eff';ctx.fill();
    }
    ctx.shadowBlur=0;ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
  });
}
function drawCached(){
  if(!mapCache||mapCache.width!==canvas.width||mapCache.height!==canvas.height){
    mapCache=document.createElement('canvas');mapCache.width=canvas.width;mapCache.height=canvas.height;
    var oc=mapCache.getContext('2d'),sv=ctx;ctx=oc;drawMap();ctx=sv;
  }
  ctx.drawImage(mapCache,0,0);drawMarkers();
  requestAnimationFrame(drawCached);
}
var dragging=false,dragX,dragY;
canvas.addEventListener('mousedown',function(e){dragging=true;dragX=e.clientX;dragY=e.clientY;});
canvas.addEventListener('mouseup',function(){dragging=false;mapCache=null;});
canvas.addEventListener('mousemove',function(e){
  if(dragging){offsetX+=e.clientX-dragX;offsetY+=e.clientY-dragY;dragX=e.clientX;dragY=e.clientY;}
  checkHover(e.clientX,e.clientY);
});
canvas.addEventListener('wheel',function(e){
  e.preventDefault();var f=e.deltaY<0?1.1:0.9;
  scale*=f;offsetX=e.clientX-(e.clientX-offsetX)*f;offsetY=e.clientY-(e.clientY-offsetY)*f;mapCache=null;
},{passive:false});
function zoom(f){scale*=f;offsetX=canvas.width/2-(canvas.width/2-offsetX)*f;offsetY=canvas.height/2-(canvas.height/2-offsetY)*f;mapCache=null;}
function checkHover(mx,my){
  var tip=document.getElementById('tooltip'),found=false;
  guards.concat(sites.map(s=>({...s,type:'site'}))).forEach(function(item){
    var p=project(item.lat,item.lon),d=Math.sqrt((mx-p.x)**2+(my-p.y)**2);
    if(d<12){tip.style.display='block';tip.style.left=(mx+14)+'px';tip.style.top=(my-10)+'px';
      tip.innerHTML=item.type==='site'?'<b>'+item.name+'</b><br><span style="color:#ff6666">Security Site</span>':'<b>'+item.name+'</b><br>'+(item.assigned?'<span style="color:#00e676">On Duty</span>':'<span style="color:#3b9eff">Available</span>');
      found=true;}
  });
  if(!found)tip.style.display='none';
}
function addGuardMarker(lat,lon,name,assigned){var e=guards.find(g=>g.name===name);if(e){e.lat=+lat;e.lon=+lon;e.assigned=!!assigned;return;}guards.push({lat:+lat,lon:+lon,name:name,assigned:!!assigned});}
function addSiteMarker(lat,lon,name){if(sites.find(s=>s.name===name))return;sites.push({lat:+lat,lon:+lon,name:name,type:'site'});}
function updateGuardPosition(id,lat,lon,assigned){var g=guards.find(g=>g.name===id);if(g){g.lat=+lat;g.lon=+lon;g.assigned=!!assigned;}}
function drawCurvedRoute(glat,glon,slat,slon){routes.push({glat:+glat,glon:+glon,slat:+slat,slon:+slon});}
function clearMap(){guards=[];sites=[];routes=[];mapCache=null;}
function fitAll(){}
resize();drawCached();
</script>
</body>
</html>
